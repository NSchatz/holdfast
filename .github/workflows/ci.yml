name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned for reproducibility. Go 1.25.x clears the os.Root-escape stdlib advisory
  # (GO-2026-4602, fixed in go1.25.8) that govulncheck flags on older lines; keep
  # this at a patched >= 1.25.8. Tool versions pinned below.
  GO_VERSION: "1.25.12"
  STATICCHECK_VERSION: "2025.1.1"
  GOVULNCHECK_VERSION: "v1.1.4"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false

      - name: gofmt (must be clean)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      # Config schema self-test (anti-advisory-only): the committed example must
      # validate, and each known-invalid config must be REJECTED — one via the schema
      # (unknown key) and one via value validation (out-of-range crf), so both
      # rejection paths are covered. Proves the `validate` subcommand + schema wire
      # together end to end, and that the gate actually reds — not just that go test passed.
      - name: config schema self-test
        run: |
          go build -o /tmp/transcode ./cmd/transcode
          /tmp/transcode validate --config config.example.yaml
          for bad in testdata/config-invalid.yaml testdata/config-invalid-value.yaml; do
            if /tmp/transcode validate --config "$bad"; then
              echo "::error::invalid config $bad was ACCEPTED — schema gate is broken"; exit 1
            fi
          done
          echo "config schema self-test OK (valid accepted; unknown-key + bad-value rejected)"

      # The engine safety proof drives REAL ffmpeg fixtures — it fails loud if
      # ffmpeg/ffprobe (or, for the VMAF gate, libvmaf) are missing (a skip would be a
      # false green). Ubuntu's apt ffmpeg does NOT ship libvmaf, so install a static
      # build that carries libx265 + libvmaf (matching the local dev + Docker-image
      # ffmpeg). This is the environment the transcoder is actually tested against.
      - name: install ffmpeg (libx265 + libvmaf)
        run: |
          url="https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
          curl -fsSL -o /tmp/ffmpeg.tar.xz "$url"
          sudo mkdir -p /opt/ffmpeg
          sudo tar -C /opt/ffmpeg --strip-components=1 -xf /tmp/ffmpeg.tar.xz
          echo "/opt/ffmpeg/bin" >> "$GITHUB_PATH"
          /opt/ffmpeg/bin/ffmpeg -hide_banner -filters | grep -q libvmaf \
            || { echo "::error::the installed ffmpeg lacks libvmaf"; exit 1; }
          /opt/ffmpeg/bin/ffmpeg -hide_banner -encoders | grep -q libx265 \
            || { echo "::error::the installed ffmpeg lacks libx265"; exit 1; }
          echo "ffmpeg with libx265 + libvmaf installed"

      - name: go test (race + coverage)
        run: go test -race -covermode=atomic ./...

      - name: staticcheck (pinned)
        run: go run "honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION}" ./...

      - name: govulncheck (pinned)
        run: go run "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}" ./...
