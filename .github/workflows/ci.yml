name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned for reproducibility. Go 1.25.x clears the os.Root-escape stdlib advisory
  # (GO-2026-4602, fixed in go1.25.8) that govulncheck flags on older lines; keep
  # this at a patched >= 1.25.8. Tool versions pinned below.
  GO_VERSION: "1.25.12"
  STATICCHECK_VERSION: "2025.1.1"
  GOVULNCHECK_VERSION: "v1.1.4"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false

      - name: gofmt (must be clean)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      # The engine safety proof drives REAL ffmpeg (libx265) fixtures — it fails loud
      # if ffmpeg/ffprobe are missing (a skip would be a false green), so CI must
      # provide them. Ubuntu's ffmpeg ships libx265/libx264.
      - name: install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: go test (race + coverage)
        run: go test -race -covermode=atomic ./...

      - name: staticcheck (pinned)
        run: go run "honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION}" ./...

      - name: govulncheck (pinned)
        run: go run "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}" ./...
