name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned for reproducibility — a patched 1.23 (>= 1.23.10 clears a Windows-only
  # stdlib advisory govulncheck would otherwise flag). Tool versions pinned below.
  GO_VERSION: "1.23.12"
  STATICCHECK_VERSION: "2024.1.1"
  GOVULNCHECK_VERSION: "v1.1.3"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false

      - name: gofmt (must be clean)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (race + coverage)
        run: go test -race -covermode=atomic ./...

      - name: staticcheck (pinned)
        run: go run "honnef.co/go/tools/cmd/staticcheck@${STATICCHECK_VERSION}" ./...

      - name: govulncheck (pinned)
        run: go run "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}" ./...
