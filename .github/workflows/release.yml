name: Release

# Publishing happens on a TAG PUSH ONLY — a deliberate human act. Nothing here fires on
# a merge to main, and the image stays private while the repository is (GHCR package
# visibility follows the repo — see the umbrella's PUB-FLIP gate).
#
# `workflow_dispatch` is ALWAYS a dry run: it does everything a tag does — builds both
# architectures, drives a real encode inside the built image, and produces the exact
# binaries a release would ship — and pushes nothing. Run it once before you cut the
# first tag.
#
# There is deliberately no "publish" input to tick. The only thing that can publish is a
# tag, so the version a release carries is always a real tag name — a dispatch-publish
# would push `0.0.0-dev-<sha>`, move `:latest` onto it, and cut a GitHub release named
# after a sha. An escape hatch that can only be used wrongly should not exist.
#
# The packaging gate itself (scripts/smoke-image.sh) is not duplicated here: it is the
# same script CI runs on every PR, so what a tag ships is what has been gated all along.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  # No staticcheck/govulncheck pins here: the gate is `make check`, so the Makefile owns
  # those versions — and ci.yml goes through the same target, so the PR gate and the
  # release gate cannot run different tools. One gate, defined once.
  GO_VERSION: "1.25.12"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # cut the GitHub release
      packages: write # push the image to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: plan (publish? version? image?)
        id: plan
        env:
          EVENT: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # A tag push publishes. Nothing else does — see the header.
          if [ "$EVENT" = "push" ]; then
            publish=true
            version="$REF_NAME"
          else
            publish=false
            version="0.0.0-dev-${GITHUB_SHA::7}"
          fi
          # GHCR rejects uppercase; github.repository preserves the owner's case.
          image="ghcr.io/$(echo "$REPO" | tr '[:upper:]' '[:lower:]')"
          # One timestamp for every artifact this run produces.
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # A pre-release tag (v1.0.0-rc1, v2.0.0-beta.1 — anything with a suffix) must
          # NOT become `:latest`, or `docker pull` hands a release candidate to everyone
          # who did not ask for one.
          prerelease=false
          case "$version" in *-*) prerelease=true ;; esac

          # NOTE the remaining footgun: a BACKPORT tag (v1.2.4 cut after v2.0.0) is not a
          # pre-release, so promoting it would still move `:latest` backwards. Cut
          # backports from a maintenance branch and accept that, or gate the promotion
          # below on a version comparison.

          {
            echo "publish=$publish"
            echo "version=$version"
            echo "image=$image"
            echo "date=$date"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"
          echo "publish=$publish  version=$version  prerelease=$prerelease  image=$image  date=$date"

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false

      # A release re-gates itself rather than trusting that CI ran on this commit — a tag
      # can point at ANY commit, including one CI never ran on or one CI failed on, and
      # ci.yml does not trigger on tags. So run the repo's whole gate here, not a token
      # slice of it: `make check` — the same target CI and a human run, whose definition
      # lives in the Makefile (it includes the real-ffmpeg fixture suite, the data-safety
      # proof). A release whose only gate was govulncheck would happily publish an image
      # whose verify/swap logic is red. "Zero runs is not a pass, it is an unknown."
      - name: install ffmpeg (the pin the image ships) — the fixture suite needs it
        run: |
          set -euo pipefail
          sudo mkdir -p /opt/ffmpeg
          sudo chown "$USER" /opt/ffmpeg
          ./scripts/install-ffmpeg.sh /opt/ffmpeg
          echo "/opt/ffmpeg/bin" >> "$GITHUB_PATH"

      - name: the full gate (make check)
        run: make check

      # QEMU is only needed to EXECUTE the arm64 image; building it cross-compiles.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: build the image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: holdfast:release
          build-args: |
            VERSION=${{ steps.plan.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.plan.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The image we are about to push must pass a REAL encode, not merely build.
      - name: smoke test the image (real encode, real gate)
        run: ./scripts/smoke-image.sh holdfast:release

      - name: build the image (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          load: true
          tags: holdfast:release-arm64
          build-args: |
            VERSION=${{ steps.plan.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.plan.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: smoke test the arm64 image (exec only, under QEMU)
        run: ./scripts/smoke-image.sh holdfast:release-arm64 linux/arm64 --no-encode

      - name: build the release binaries
        env:
          VERSION: ${{ steps.plan.outputs.version }}
          DATE: ${{ steps.plan.outputs.date }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # The licence text travels INSIDE each archive. holdfast is AGPL-3.0-only, so
          # a tarball carrying the binary and nothing else distributes it with no licence
          # at all — which is the gap the NOTICE file was added to close, and it does not
          # close it by sitting next to the tarball in a CI artifact that expires.
          cp LICENSE NOTICE dist/
          for target in linux/amd64 linux/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath \
              -ldflags="-s -w \
                -X github.com/NSchatz/holdfast/internal/version.Version=${VERSION} \
                -X github.com/NSchatz/holdfast/internal/version.Commit=${GITHUB_SHA} \
                -X github.com/NSchatz/holdfast/internal/version.Date=${DATE}" \
              -o dist/holdfast ./cmd/holdfast
            tar -C dist -czf "dist/holdfast_${VERSION}_${os}_${arch}.tar.gz" \
              holdfast LICENSE NOTICE
            rm dist/holdfast
          done
          ( cd dist && sha256sum ./*.tar.gz > SHA256SUMS )
          tar -tzf "dist/holdfast_${VERSION}_linux_amd64.tar.gz"
          ls -l dist

      # Uploaded even on a dry run, so "the release is green" is inspectable rather than
      # asserted: the artifacts a tag WOULD ship are downloadable from the run.
      - uses: actions/upload-artifact@v4
        with:
          name: release-dist-${{ steps.plan.outputs.version }}
          path: dist/
          if-no-files-found: error

      # --- everything below this line only happens on a real release ------------------
      - name: log in to GHCR
        if: steps.plan.outputs.publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # This is a REBUILD from the buildx cache, not a push of the exact bits the two
      # smoke steps loaded — buildx cannot push a multi-arch manifest it only loaded
      # locally. The inputs are identical and ffmpeg is sha-pinned, so it is equivalent
      # — but "equivalent" is not "the same artifact", and this repo does not accept a
      # gate by equivalence. So we pull the pushed image back and smoke it below.
      #
      # ONLY the version tag is pushed here. `:latest` is NOT — because a tag push is
      # immediately pullable, and if the gate below then reds, `:latest` would already be
      # pointing at an image that failed it, for every user running `docker compose pull`.
      # `:latest` is promoted only AFTER the pushed artifact passes, further down.
      - name: push the multi-arch image (version tag only)
        if: steps.plan.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.plan.outputs.image }}:${{ steps.plan.outputs.version }}
          build-args: |
            VERSION=${{ steps.plan.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.plan.outputs.date }}
          cache-from: type=gha

      # The gate on the ARTIFACT, not on a local build of it: pull back what was actually
      # pushed, for BOTH architectures of the manifest, and drive a real encode through
      # the native one. An unqualified `docker pull` resolves only the runner's own arch,
      # so the arm64 half would otherwise ship having been gated only as a local build —
      # the exact gate-by-equivalence this step exists to reject.
      - name: smoke test the PUSHED image (both arches)
        if: steps.plan.outputs.publish == 'true'
        env:
          REF: ${{ steps.plan.outputs.image }}:${{ steps.plan.outputs.version }}
        run: |
          set -euo pipefail
          docker image rm -f "$REF" >/dev/null 2>&1 || true   # never smoke a local leftover
          docker pull --platform linux/amd64 "$REF"
          ./scripts/smoke-image.sh "$REF"

          docker pull --platform linux/arm64 "$REF"
          ./scripts/smoke-image.sh "$REF" linux/arm64 --no-encode

      # Now, and only now, does `:latest` move — onto the exact digest that just passed.
      # imagetools retags the existing manifest; it does not rebuild, so `:latest` and
      # `:<version>` are the same bytes, not two builds that ought to agree.
      - name: promote :latest to the gated image
        if: steps.plan.outputs.publish == 'true' && steps.plan.outputs.prerelease == 'false'
        env:
          IMAGE: ${{ steps.plan.outputs.image }}
          VERSION: ${{ steps.plan.outputs.version }}
        run: |
          set -euo pipefail
          docker buildx imagetools create -t "${IMAGE}:latest" "${IMAGE}:${VERSION}"
          docker buildx imagetools inspect "${IMAGE}:latest" | head -20

      - name: cut the GitHub release
        if: steps.plan.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.plan.outputs.version }}
          IMAGE: ${{ steps.plan.outputs.image }}
          PRERELEASE: ${{ steps.plan.outputs.prerelease }}
        run: |
          set -euo pipefail
          args=(--title "$VERSION" --generate-notes)
          [ "$PRERELEASE" = "true" ] && args+=(--prerelease)
          gh release create "$VERSION" "${args[@]}" \
            --notes "Container image: \`${IMAGE}:${VERSION}\` (linux/amd64, linux/arm64).

          The binaries need \`ffmpeg\`/\`ffprobe\` **with libx265 and libvmaf** on PATH. The image bundles a pinned, checksum-verified build — it is the supported way to run this." \
            dist/*.tar.gz dist/SHA256SUMS
