# transcode — example configuration (config-as-code).
#
# Copy to config.yaml (gitignored) and edit. Validate it any time with:
#   transcode validate --config config.yaml
#
# Every knob below has a sensible default and may be omitted. Any value can be
# overridden by an environment variable named TRANSCODE_<KEY> (e.g. TRANSCODE_CRF=20,
# TRANSCODE_LOG_LEVEL=debug) — env wins over the file. An unknown key here is a hard
# error (typo protection).
#
# Running in a container? Three keys change: library_roots and state_dir become the
# paths you MOUNTED, and server_addr must be 0.0.0.0 (127.0.0.1 inside a container
# namespace is unreachable from the host — publish the port on loopback instead).
# See docs/docker.md.

# Directory trees to scan and re-encode files under. This is the ONLY place transcode
# ever mutates the filesystem, so it is validated strictly: each root must be absolute
# and must not be "/" or your home directory.
library_roots:
  - /mnt/media

# Log verbosity: debug | info | warn | error  (default: info)
log_level: info

# When true, report intended actions without changing any file.
dry_run: false

# --- what to scan ---
# File extensions considered (case-insensitive).
# video_exts: [mkv, mp4, avi, mov, m4v, ts, m2ts, wmv, flv]

# --- codec / quality: the codec matrix (TRANSCODE-6) ---
# encoder: cpu           # cpu (libx265/hevc) is the ARCHIVAL DEFAULT — best
#                         # quality-per-bit, always available, no external device.
#                         # Everything else is opt-in, for draining a backlog
#                         # faster at a lower quality-per-bit:
#                         #   svtav1     libsvtav1  -> av1   (CPU, no device needed)
#                         #   nvenc      hevc_nvenc -> hevc  (needs an NVIDIA GPU)
#                         #   av1_nvenc  av1_nvenc  -> av1   (needs an NVIDIA GPU)
#                         #   qsv        hevc_qsv   -> hevc  (needs Intel Quick Sync)
#                         #   vaapi      hevc_vaapi -> hevc  (needs a VAAPI device,
#                         #                                   e.g. /dev/dri/renderD128)
#                         #   amf        hevc_amf   -> hevc  (needs an AMD GPU)
#                         # The raw ffmpeg -c:v codec name (e.g. libsvtav1) also
#                         # works as an alias for its short key.
#                         #
#                         # CAPABILITY CHECK: at `run` startup the configured
#                         # encoder is actually exercised against a tiny real clip
#                         # (not just an exit-code check — a hardware encoder can
#                         # exit 0 while writing nothing when no device is
#                         # present). If it's not available in this ffmpeg build /
#                         # on this host, `run` FAILS LOUD and exits non-zero —
#                         # it never silently falls back to cpu.
#                         #
#                         # Whichever encoder produces the output, it is verified
#                         # against the EXACT SAME no-loss gate as cpu: correct
#                         # codec, duration/packet parity, strictly-smaller,
#                         # stream-count parity, full decode-integrity, and VMAF.
#                         # A hardware/av1 encode that fails any gate is rejected
#                         # and the source is kept — no encoder is special-cased.
# crf: 22                # quality knob (lower = bigger/better): libx265/libsvtav1
#                         # constant-rate-factor, or reused as the CQ/
#                         # global_quality/QP target for nvenc/qsv/vaapi/amf.
# preset: slow           # speed/quality preset. A libx265 preset word for cpu;
#                         # mapped to SVT-AV1's numeric 0-13 scale for svtav1
#                         # (slow -> 6, medium -> 8, fast -> 10; unrecognized
#                         # words fall back to 8). Ignored by the hardware
#                         # encoders.
#
# AV1/hardware HDR limitation: HDR10 static metadata (the mastering-display +
# MaxCLL block) is carried through the encode ONLY for cpu (libx265's
# -x265-params mechanism). svtav1 and every hardware encoder still carry the
# colour PRIMARIES/TRANSFER/MATRIX/RANGE tags (via the universal -color_* flags)
# but NOT the mastering-display block — AV1 static-metadata carriage would need
# svt-av1-params mastering-display/content-light options, which is out of scope
# here. This mirrors the pre-existing NVENC limitation the original bash
# transcoder already documented; a source needing full HDR10 static-metadata
# carriage should stay on encoder: cpu.

# pixel_format: auto     # "auto" (default): derive per source — preserve chroma
#                         # subsampling (4:2:0/4:2:2/4:4:4), floor bit-depth at 10
#                         # (8-bit -> 10-bit; 10/12/16-bit sources keep their own
#                         # depth). An exotic/unrecognized source pix_fmt is
#                         # SKIPPED, never silently subsampled. Set a literal value
#                         # (e.g. yuv420p10le) to force that pix_fmt for every
#                         # source instead (TRANSCODE-1 back-compat behaviour).

# container_ext: source  # "source" or "auto" (default, equivalent): output
#                         # container = the SOURCE file's own extension, so the
#                         # transcode happens in place (mp4 -> mp4, mkv -> mkv).
#                         # This avoids force-migrating a container whose stream
#                         # types don't round-trip elsewhere (e.g. an MP4 with
#                         # mov_text subtitles into MKV, which can't carry them).
#                         # Set a literal value (e.g. mkv) to force that extension
#                         # for every source instead — the collision guard (never
#                         # clobber a distinct existing file at the target name)
#                         # still applies whenever the effective extension differs
#                         # from the source's own.

# --- HDR / colour + source-property fidelity (TRANSCODE-3; not separately
# configurable — always on) ---
# SKIPPED, never silently converted:
#   - an interlaced source (field_order tt/bb/tb/bt) — this tool never deinterlaces
#   - Dolby Vision (codec tag dvhe/dvh1/dvav/dav1, or a DOVI configuration record)
#     — the RPU cannot survive a generic re-encode
#   - HDR10+ (SMPTE2094-40 dynamic metadata) — cannot survive a generic re-encode
#   - an HDR10 source whose mastering-display or content-light block is PRESENT
#     but unparseable — re-encoding would silently drop metadata that IS there
#   - a source with an exotic/unrecognized pixel format (see pixel_format above)
# PRESERVED through the encode, never flattened or invented:
#   - HDR10 static metadata (mastering-display SMPTE ST 2086 + MaxCLL/FALL) and the
#     colour primaries/transfer/matrix/range tags — an SDR source is never wrongly
#     tagged HDR, and an HDR source never has metadata invented that it didn't signal
#   - 4:2:2 / 4:4:4 chroma subsampling (not flattened to 4:2:0)
#   - variable frame-rate timing (`-fps_mode passthrough` — not forced to CFR)

# --- data-safety guards (do not loosen without understanding them) ---
# min_bitrate_kbps: 2500     # skip sources below this — re-encoding them only bloats
# min_savings_percent: 0     # accept only if output <= input*(1-this/100); 0 = strictly smaller
# duration_tolerance_sec: 1  # reject if output duration drifts more than this
# max_failures: 3            # retry a failing file this many times before parking it
# skip_hardlinked: true      # skip files with >1 hard link (an active seed/dup)

# --- VMAF perceptual-quality gate (the last no-loss layer) ---
# After the structural checks pass, VMAF compares the output against the source and
# REJECTS an encode that decodes fine but looks worse. When enabled and libvmaf is
# unavailable (or the measurement fails), the encode is rejected — never accept an
# unmeasured output. VMAF is a second full decode; raise vmaf_subsample on big libraries.
# vmaf_enable: true          # turn the gate on/off
# min_vmaf: 95               # reject if pooled harmonic-mean VMAF < this (~95 = visually lossless)
# vmaf_min_pool: 0           # >0 also rejects if the worst-frame VMAF < this (0 = off)
# vmaf_subsample: 1          # frame-sampling interval (1 = every frame; higher = cheaper)
# vmaf_model: auto           # auto = vmaf_4k for height>1440 else HD; or a model version/spec

# --- runtime ---
# state_dir: state           # holds the resumable SQLite job store (jobs.db)
# workers: 1                 # concurrent encode workers (default 1 = sequential;
#                             # CPU libx265 already saturates cores per encode, so
#                             # raising this is an opt-in for many small/low-res files)

# --- HTTP API + web UI (`transcode serve`) ---
# `transcode serve` runs a REST API + SSE live stream + an embedded web dashboard
# (single binary). It is a READ-AND-CONTROL surface: this YAML stays the source of
# truth, and the API can only start a scan and pause/resume new-file feeding — it
# never touches a media file.
# server_addr: 127.0.0.1:8080  # bind address. LOCALHOST by default (fail-safe: the
#                              #   control surface is not network-exposed unless you
#                              #   opt in — then front it with a reverse proxy).
# server_auth_token: ""        # bearer token required for the MUTATING endpoints
#                              #   (rescan/pause/resume). Empty = those endpoints are
#                              #   DISABLED (read-only). Prefer the environment
#                              #   variable TRANSCODE_SERVER_AUTH_TOKEN so no secret
#                              #   lands in this file.
# scan_interval_sec: 0         # 0 = scan once on startup + on demand (via the API).
#                              #   >0 = also re-scan every N seconds.

# --- observability + host-fair scheduling (`transcode serve`) ---
# metrics_enable: true         # expose Prometheus metrics at /metrics (read-only
#                              #   instrumentation; best-effort, never affects files)
# notify_url: ""               # a shoutrrr service URL for best-effort notifications
#                              #   (per-file failure + per-scan summary), e.g.
#                              #   ntfy://ntfy.sh/mytopic or a Discord/Gotify URL.
#                              #   Empty disables. May carry a secret — prefer the env
#                              #   var TRANSCODE_NOTIFY_URL over this file.
# run_window: ""               # daily host-fair window "HH:MM-HH:MM" (local time)
#                              #   during which new work may start; empty = always.
#                              #   Outside it, serve stops feeding NEW files (an
#                              #   in-flight encode always finishes) — it only DELAYS.
# max_load: 0                  # per-core 1-min load-average cap; while the host is
#                              #   above it, stop feeding new files. 0 disables.
# tautulli_url: ""             # optional Plex-aware pause: while Tautulli reports an
# tautulli_api_key: ""         #   active stream, stop feeding new files. Both required
#                              #   to enable; a Tautulli outage fails OPEN (never halts
#                              #   transcoding). Prefer env vars for the API key.
