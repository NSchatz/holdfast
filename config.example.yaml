# transcode — example configuration (config-as-code).
#
# Copy to config.yaml (gitignored) and edit. Validate it any time with:
#   transcode validate --config config.yaml
#
# This is the GENESIS surface (TRANSCODE-0): only the fields below are read today.
# The full, koanf-backed schema (codec/quality knobs, VMAF thresholds, queue,
# scheduling, notifications, API/UI) arrives in later phases — see the roadmap.

# Directory trees to scan and (in later phases) re-encode files under. This is the
# ONLY place transcode ever mutates the filesystem, so it is validated strictly:
# each root must be absolute and must not be "/" or your home directory.
library_roots:
  - /mnt/media

# Log verbosity: debug | info | warn | error  (default: info)
log_level: info

# When true, report intended actions without changing any file.
dry_run: false
